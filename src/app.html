<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <!-- Default title/description — each page overrides via svelte:head -->

  <meta name="google-site-verification" content="E3HGhOGoia7msiHkl_qnyS6LEDz29XkAxlQ1osfWfHg" />

  <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="kceva" />

  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover" class="font-sans antialiased bg-white text-gray-900">
  <div style="display: contents">%sveltekit.body%</div>

</html>
